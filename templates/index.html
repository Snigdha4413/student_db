<!DOCTYPE html>
<html>
<head>
    <title>Student Search</title>
    <style>
        body { font-family: sans-serif; margin: 50px; line-height: 1.6; }
        .result-box { background: #f4f4f4; padding: 20px; border-radius: 8px; margin-top: 20px; }
    </style>
</head>
<body>
    <h2>Search Student</h2>
    <form method="POST">
        <input type="text" name="name" placeholder="Enter student name" required>
        <button type="submit">Search</button>
    </form>

    {% if student %}
        <div class="result-box">
            <h3>Student Details</h3>
            <p><strong>Name:</strong> {{student[1]}}</p>
            <p><strong>Age:</strong> {{student[2]}}</p>
            <p><strong>Course:</strong> {{student[3]}}</p>
            <p><strong>Email:</strong> {{student[4]}}</p>
        </div>
    {% elif request.method == 'POST' %}
        <p>No student found with that name.</p>
    {% endif %}
</body>
</html>
